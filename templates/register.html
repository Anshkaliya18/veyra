<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Veyra-web</title>
    <link rel="icon" type="image/png" href="/assets/images/favicon.png">
    <link rel="stylesheet" href="css/register.css" />
    <link rel="stylesheet" href="css/motion.css" />
  </head>
  <body>
    <div class="grid-noise"></div>
    <main class="auth">
      <section class="auth-wrap">
        <aside class="auth-art">
          <a class="brand" href="/"
            ><i class="brand-mark"></i
            ><span class="brand-name">ve<span>y</span>ra</span></a
          ><span class="badge" style="margin-top: 78px"
            ><i class="dot"></i> Begin your journey</span
          >
          <h1>
            Turn your work into <span class="gradient-text">momentum.</span>
          </h1>
          <p>
            A focused, intelligent home for every thing you’ve learned, built,
            and become.
          </p>
          <div class="orb orb-a"><i></i></div>
          <div class="orb orb-b"><i></i></div>
        </aside>
        <form class="auth-form" data-auth method="post" action="/signup">
          <p class="eyebrow">Create account</p>
          <h2>Begin with a single thread.</h2>
          <p class="muted">Your identity workspace is ready when you are.</p>
          <div class="form-field">
            <label for="name">YOUR NAME</label>
            <div class="input-wrap">
              <input id="name" name="name" placeholder="Ansh Kumar" required />
            </div>
          </div>
          <div class="form-field">
            <label for="email">EMAIL ADDRESS</label>
            <div class="input-wrap">
              <input
                id="email"
                name="email"
                type="email"
                placeholder="you@example.com"
                required
              />
            </div>
          </div>
          <div class="form-field">
            <label for="password">CREATE PASSWORD</label>
            <div class="input-wrap">
              <input
                id="password"
                name="password"
                type="password"
                placeholder="At least 8 characters"
                minlength="8"
                required
              />
            </div>
          </div>
          <div class="form-field">
            <label for="confirmPassword">CONFIRM PASSWORD</label>
            <div class="input-wrap">
              <input
                id="confirmPassword"
                name="confirmPassword"
                type="password"
                placeholder="Repeat your password"
                minlength="8"
                required
              />
            </div>
          </div>
          <div class="form-line">
            <label class="check"
              ><input type="checkbox" required /> I agree to the terms</label
            >
          </div>
          <button class="btn btn-primary" type="submit">
            Create my identity <span>→</span>
          </button>
          <p class="auth-foot">
            Already have an account? <a href="/login">Log in</a>
          </p>
        </form>
      </section>
    </main>
    <script src="js/shared.js"></script>
    <script src="js/register.js"></script>
  </body>
</html>
