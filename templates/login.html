<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Welcome back — Veyra</title>
    <link rel="stylesheet" href="css/login.css" />
    <link rel="stylesheet" href="css/motion.css" />
  </head>
  <body>
    <div class="grid-noise"></div>
    <main class="auth">
      <section class="auth-wrap">
        <aside class="auth-art">
          <a class="brand" href="/"
            ><i class="brand-mark"></i
            ><span class="brand-name">ve<span>y</span>ra</span></a
          >
          <h1>Your story is <span class="gradient-text">waiting.</span></h1>
          <p>
            Step back into the workspace that understands every chapter of your
            journey.
          </p>
          <div class="orb orb-a"><i></i></div>
          <div class="orb orb-b"><i></i></div>
        </aside>
        <form class="auth-form" data-auth method="post" action="/login">
          <p class="eyebrow">Welcome back</p>
          <h2>Pick up where you left off.</h2>
          <p class="muted">Sign in to your private identity workspace.</p>
          <div class="form-field">
            <label for="email">EMAIL ADDRESS</label>
            <div class="input-wrap">
              <input
                id="email"
                name="email"
                type="email"
                placeholder="you@example.com"
                required
              />
            </div>
          </div>
          <div class="form-field">
            <label for="password">PASSWORD</label>
            <div class="input-wrap">
              <input
                id="password"
                name="password"
                type="password"
                placeholder="Enter your password"
                required
              />
            </div>
          </div>
          <div class="form-line">
            <label class="check"><input type="checkbox" /> Remember me</label
            ><a href="#">Forgot password?</a>
          </div>
          <button class="btn btn-primary" type="submit">
            Continue to Veyra <span>→</span>
          </button>
          <div class="divider">or continue with</div>
          <div class="socials">
            <button class="social" type="button">G&nbsp; Google</button
            ><button class="social" type="button">◉ GitHub</button>
          </div>
          <p class="auth-foot">
            New to Veyra? <a href="/signup">Create your identity</a>
          </p>
        </form>
      </section>
    </main>
    <script src="js/shared.js"></script>
    <script src="js/login.js"></script>
  </body>
</html>
